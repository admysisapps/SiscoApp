<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html dir="ltr" lang="es">
  <head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta name="x-apple-disable-message-reformatting" />
  </head>
  <body style="background-color: rgb(255, 255, 255)">
    <table
      border="0"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      align="center"
    >
      <tbody>
        <tr>
          <td
            style="
              background-color: rgb(255, 255, 255);
              font-family: HelveticaNeue, Helvetica, Arial, sans-serif;
            "
          >
            <table
              align="center"
              width="100%"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="
                max-width: 360px;
                background-color: rgb(255, 255, 255);
                border-style: solid;
                border-width: 1px;
                border-color: rgb(238, 238, 238);
                border-radius: 0.25rem;
                box-shadow:
                  0 4px 6px -1px rgba(20, 50, 70, 0.2),
                  0 2px 4px -2px rgba(20, 50, 70, 0.2);
                margin: 0 auto;
                padding: 68px 0 130px 0;
              "
            >
              <tbody>
                <tr style="width: 100%">
                  <td>
                    <img
                      alt="SiscoApp"
                      height="100"
                      src="https://siscoapp-public-assets.s3.us-east-1.amazonaws.com/logo.png"
                      style="
                        display: block;
                        outline: none;
                        border: none;
                        text-decoration: none;
                        margin: 0 auto;
                      "
                      width="336"
                    />

                    <p
                      style="
                        font-size: 11px;
                        line-height: 16px;
                        color: rgb(10, 133, 234);
                        font-weight: 700;
                        height: 16px;
                        letter-spacing: 0;
                        margin: 16px 8px 8px 8px;
                        text-transform: uppercase;
                        text-align: center;
                      "
                    >
                      Acceso Temporal
                    </p>

                    <h1
                      style="
                        color: rgb(0, 0, 0);
                        font-weight: 500;
                        font-family:
                          HelveticaNeue-Medium, Helvetica, Arial, sans-serif;
                        display: block;
                        font-size: 20px;
                        line-height: 24px;
                        margin: 0;
                        text-align: center;
                        padding: 0 20px;
                      "
                    >
                      Usa los siguientes datos para ingresar a SiscoApp.
                    </h1>

                    <!-- Usuario -->
                    <p
                      style="
                        font-size: 13px;
                        line-height: 20px;
                        color: rgb(68, 68, 68);
                        text-align: center;
                        margin: 16px 0 4px 0;
                      "
                    >
                      Documento:
                    </p>
                    <table
                      align="center"
                      width="100%"
                      border="0"
                      cellpadding="0"
                      cellspacing="0"
                      role="presentation"
                      style="
                        background-color: rgba(0, 0, 0, 0.05);
                        border-radius: 0.25rem;
                        margin: 0 auto 14px auto;
                        width: 280px;
                      "
                    >
                      <tbody>
                        <tr>
                          <td>
                            <p
                              style="
                                font-size: 18px;
                                line-height: 40px;
                                color: rgb(0, 0, 0);
                                font-weight: 700;
                                letter-spacing: 2px;
                                padding: 8px 0;
                                margin: 0;
                                display: block;
                                text-align: center;
                              "
                            >
                              {username}
                            </p>
                          </td>
                        </tr>
                      </tbody>
                    </table>

                    <!-- Contraseña temporal -->
                    <p
                      style="
                        font-size: 13px;
                        line-height: 20px;
                        color: rgb(68, 68, 68);
                        text-align: center;
                        margin: 0 0 4px 0;
                      "
                    >
                      Tu contraseña temporal es:
                    </p>
                    <table
                      align="center"
                      width="100%"
                      border="0"
                      cellpadding="0"
                      cellspacing="0"
                      role="presentation"
                      style="
                        background-color: rgba(0, 0, 0, 0.05);
                        border-radius: 0.25rem;
                        margin: 0 auto 14px auto;
                        font-family: HelveticaNeue-Bold;
                        vertical-align: middle;
                        width: 280px;
                      "
                    >
                      <tbody>
                        <tr>
                          <td>
                            <p
                              style="
                                font-size: 32px;
                                line-height: 40px;
                                color: rgb(0, 0, 0);
                                font-weight: 700;
                                letter-spacing: 6px;
                                padding: 8px 0;
                                margin: 0;
                                display: block;
                                text-align: center;
                              "
                            >
                              {####}
                            </p>
                          </td>
                        </tr>
                      </tbody>
                    </table>

                    <p
                      style="
                        font-size: 15px;
                        line-height: 23px;
                        color: rgb(68, 68, 68);
                        letter-spacing: 0;
                        padding: 0 40px;
                        margin: 0;
                        text-align: center;
                      "
                    >
                      Te pediremos cambiar tu contraseña al iniciar sesión por
                      primera vez.
                    </p>

                    <p
                      style="
                        font-size: 15px;
                        line-height: 23px;
                        color: rgb(68, 68, 68);
                        letter-spacing: 0;
                        padding: 0 40px;
                        margin: 12px 0 0 0;
                        text-align: center;
                      "
                    >
                      ¿No esperabas este correo? Contacta a
                      <a
                        href="mailto:atencionalcliente@admysis.com"
                        style="
                          color: rgb(68, 68, 68);
                          text-decoration: underline;
                        "
                        target="_blank"
                        >atencionalcliente@admysis.com</a
                      >
                    </p>
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- <p style="font-size:12px;line-height:23px;color:rgb(0,0,0);font-weight:800;letter-spacing:0;margin:20px 0 0 0;text-align:center;text-transform:uppercase">
              Powered by SiscoApp.
            </p> -->
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
